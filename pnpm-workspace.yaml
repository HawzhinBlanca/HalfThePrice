packages:
  - apps/*
  - packages/*

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
overrides:
  "@types/react": "^19.1.6"
  "@types/react-dom": "^19.1.5"
  # Patch high-severity undici advisories (Expo transitive deps).
  # GHSA-vmh5-mc38-953g, GHSA-vxpw-j846-p89q, GHSA-hm92-r4w5-c3mj
  "undici": ">=7.28.0"

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - '@sentry/cli'
  - esbuild
  - prisma
  - sharp
  - unrs-resolver
