# Fly.io deployment config for HalfThePrice web app
# Deploy: fly deploy (requires flyctl + secrets)
# Docs: https://fly.io/docs/reference/configuration/

app = "half-the-price"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  MINIO_BUCKET = "htp-kyc"
  MEILISEARCH_HOST = "http://half-the-price-meili.internal:7700"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Required secrets (set via `fly secrets set`):
#   DATABASE_URL
#   NEXTAUTH_SECRET
#   NEXTAUTH_URL
#   CRON_SECRET
#   MINIO_ENDPOINT
#   MINIO_ACCESS_KEY
#   MINIO_SECRET_KEY
#   MEILISEARCH_API_KEY
#   CENTRIFUGO_TOKEN_SECRET
#   CENTRIFUGO_API_KEY
#   PAYMENT_WEBHOOK_SECRET
#   SENTRY_DSN (optional)
