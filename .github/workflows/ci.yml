name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: htp
          POSTGRES_PASSWORD: htp_dev_password
          POSTGRES_DB: half_the_price
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U htp -d half_the_price"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://htp:htp_dev_password@localhost:5432/half_the_price?schema=public
      NEXTAUTH_SECRET: ci-test-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3001
      PLAYWRIGHT_BASE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push database schema
        run: pnpm db:push

      - name: Seed database
        run: pnpm db:seed

      - name: Lint
        run: pnpm lint

      - name: Unit tests (web)
        run: pnpm --filter @htp/web test

      - name: Unit tests (database)
        run: pnpm --filter @htp/database test

      - name: Integration tests
        run: pnpm --filter @htp/database test:integration

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E tests
        run: pnpm test:e2e
