name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: htp
          POSTGRES_PASSWORD: htp_dev_password
          POSTGRES_DB: half_the_price
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U htp -d half_the_price"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://htp:htp_dev_password@localhost:5432/half_the_price?schema=public
      NEXTAUTH_SECRET: ci-test-secret-not-for-production
      NEXTAUTH_URL: http://localhost:3001
      PLAYWRIGHT_BASE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - name: Grep guards
        run: |
          # 1. No *.js files under packages/*/src or apps/*/src
          if find packages apps -path "*/src/*.js" | grep .; then
            echo "Error: Leaked JS files found in source directories."
            exit 1
          fi

          # 2. No nested packages/*/packages/ directory
          if find packages -mindepth 2 -type d -name "packages" | grep .; then
            echo "Error: Nested packages/ directory found under packages/*/"
            exit 1
          fi

          # 3. No dev-secret literal in source files
          if git grep -i "dev-secret" -- ':!.github/workflows/ci.yml'; then
            echo "Error: Forbidden 'dev-secret' literal found in the codebase."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Supply-chain security audit
        run: pnpm audit --audit-level=high

      - name: Generate Software Bill of Materials (SBOM)
        run: |
          # --ignore-npm-errors: this is a pnpm workspace, so `npm ls` reports phantom
          # "missing" peer/dev deps; the flag lets cyclonedx still emit a valid SBOM.
          npx -y @cyclonedx/cyclonedx-npm@1.19.2 --ignore-npm-errors --output-format JSON --output-file sbom.json

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Deploy database migrations
        # Use the project's pinned prisma (6.x) + its schema, not `npx prisma` (pulls latest major).
        run: pnpm --filter @htp/database exec prisma migrate deploy

      - name: Verify schema drift
        run: pnpm --filter @htp/database exec prisma migrate diff --from-schema-datamodel prisma/schema.prisma --to-schema-datasource prisma/schema.prisma --exit-code


      - name: Seed database
        run: pnpm db:seed

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (web)
        run: pnpm --filter @htp/web test

      - name: Unit tests (database)
        run: pnpm --filter @htp/database test

      - name: Integration tests (database + money-path with coverage gate)
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E tests
        run: pnpm test:e2e
